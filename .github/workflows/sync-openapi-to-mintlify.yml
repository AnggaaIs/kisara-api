name: Sync OpenAPI to Mintlify Repo

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - src/router/**
      - src/models/validation/**
      - src/config/api-docs.ts
      - src/controllers/**

jobs:
  sync-openapi:
    runs-on: ubuntu-latest
    steps:
      - name: Determine source OpenAPI URL
        id: source
        run: |
          URL="${{ vars.OPENAPI_SOURCE_URL }}"
          if [ -z "$URL" ]; then
            URL="https://api.kisara.my.id/openapi.json"
          fi
          FALLBACK_URL="${{ vars.OPENAPI_SOURCE_URL_FALLBACK }}"
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "fallback_url=$FALLBACK_URL" >> "$GITHUB_OUTPUT"

      - name: Bypass Cloudflare for GitHub Action
        uses: xiaotianxt/bypass-cloudflare-for-github-action@v2.1.0
        with:
          cf_account_id: ${{ secrets.CF_ACCOUNT_ID }}
          cf_zone_id: ${{ secrets.CF_ZONE_ID }}
          cf_api_token: ${{ secrets.CF_API_TOKEN }}
          disable_bot_fight_mode: "true"

      - name: Download OpenAPI spec
        run: |
          URL="${{ steps.source.outputs.url }}"
          FALLBACK_URL="${{ steps.source.outputs.fallback_url }}"

          download() {
            local TARGET_URL="$1"
            curl -fLsS \
            --retry 3 \
            --retry-all-errors \
            --connect-timeout 20 \
            --max-time 90 \
            -A "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0 Safari/537.36" \
            -H "Accept: application/json" \
            "$TARGET_URL" -o openapi.json
          }

          if ! download "$URL"; then
            echo "Failed to download OpenAPI from primary URL: $URL"
            echo "Response headers for diagnostics:"
            curl -IsS "$URL" || true

            if [ -n "$FALLBACK_URL" ]; then
              echo "Trying fallback URL: $FALLBACK_URL"
              if ! download "$FALLBACK_URL"; then
                echo "Failed to download OpenAPI from fallback URL: $FALLBACK_URL"
                echo "Response headers for fallback diagnostics:"
                curl -IsS "$FALLBACK_URL" || true
                exit 1
              fi
            else
              echo "Likely blocked by Cloudflare/WAF for GitHub Actions IP."
              echo "Set OPENAPI_SOURCE_URL_FALLBACK to a DNS-only origin URL to bypass proxy challenge."
              exit 1
            fi
          fi
          node -e "JSON.parse(require('fs').readFileSync('openapi.json','utf8')); console.log('OpenAPI JSON valid')"

      - name: Clone Mintlify docs repository
        env:
          MINTLIFY_DOCS_REPO: ${{ vars.MINTLIFY_DOCS_REPO }}
          MINTLIFY_DOCS_PAT: ${{ secrets.MINTLIFY_DOCS_PAT }}
        run: |
          if [ -z "$MINTLIFY_DOCS_REPO" ]; then
            echo "Repository variable MINTLIFY_DOCS_REPO is required (format: owner/repo)"
            exit 1
          fi
          if [ -z "$MINTLIFY_DOCS_PAT" ]; then
            echo "Secret MINTLIFY_DOCS_PAT is required (contents:write on docs repo)"
            exit 1
          fi
          git clone "https://x-access-token:${MINTLIFY_DOCS_PAT}@github.com/${MINTLIFY_DOCS_REPO}.git" docs-repo

      - name: Update OpenAPI file in docs repo
        run: |
          mkdir -p docs-repo/openapi
          cp openapi.json docs-repo/openapi/openapi.json

      - name: Commit and push if changed
        working-directory: docs-repo
        run: |
          git add openapi/openapi.json
          if git diff --cached --quiet; then
            echo "No OpenAPI changes detected"
            exit 0
          fi
          git config user.name "kisara-bot"
          git config user.email "actions@users.noreply.github.com"
          git commit -m "chore: sync OpenAPI from kisara-api"
          git push
