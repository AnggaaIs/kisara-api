name: Sync OpenAPI to Mintlify Repo

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - src/router/**
      - src/models/validation/**
      - src/config/api-docs.ts
      - src/controllers/**

jobs:
  sync-openapi:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Determine source OpenAPI URL
        id: source
        run: |
          echo "Generating OpenAPI spec locally from source code..."
          pnpm generate:openapi
          node -e "JSON.parse(require('fs').readFileSync('openapi/openapi.json','utf8')); console.log('OpenAPI JSON valid')"
        - name: Generate OpenAPI spec locally
          run: |
            echo "Generating OpenAPI spec locally from source code..."
            pnpm generate:openapi
            node -e "JSON.parse(require('fs').readFileSync('openapi/openapi.json','utf8')); console.log('OpenAPI JSON valid')"

      - name: Clone Mintlify docs repository
        env:
          MINTLIFY_DOCS_REPO: ${{ vars.MINTLIFY_DOCS_REPO }}
          MINTLIFY_DOCS_PAT: ${{ secrets.MINTLIFY_DOCS_PAT }}
        run: |
          if [ -z "$MINTLIFY_DOCS_REPO" ]; then
            echo "Repository variable MINTLIFY_DOCS_REPO is required (format: owner/repo)"
            exit 1
          fi
          if [ -z "$MINTLIFY_DOCS_PAT" ]; then
            echo "Secret MINTLIFY_DOCS_PAT is required (contents:write on docs repo)"
            exit 1
          fi
          git clone "https://x-access-token:${MINTLIFY_DOCS_PAT}@github.com/${MINTLIFY_DOCS_REPO}.git" docs-repo

      - name: Update OpenAPI file in docs repo
        run: |
          mkdir -p docs-repo/openapi
          cp openapi/openapi.json docs-repo/openapi/openapi.json

      - name: Commit and push if changed
        working-directory: docs-repo
        run: |
          git add openapi/openapi.json
          if git diff --cached --quiet; then
            echo "No OpenAPI changes detected"
            exit 0
          fi
          git config user.name "kisara-bot"
          git config user.email "actions@users.noreply.github.com"
          git commit -m "chore: sync OpenAPI from kisara-api"
          git push
